spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/resume_builder?createDatabaseIfNotExist=true&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8080
spring.security.user.name=admin
spring.security.user.password=admin

# Groq AI API Configuration
ai.groq.api.key=${GROQ_API_KEY:YOUR_GROQ_API_KEY_HERE}
ai.groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
